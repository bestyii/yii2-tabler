name: build

on: [ push, pull_request ]

env:
    DEFAULT_COMPOSER_FLAGS: "--prefer-dist --no-interaction --no-progress --optimize-autoloader --ansi"

jobs:
    phpunit:
        name: PHPUnit PHP ${{ matrix.php }}-${{ matrix.dependencies }}-${{ matrix.os }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ ubuntu-latest ]
                php: [ "8.2", "8.3", "8.4" ]
                dependencies: [ stable ]
                include:
                    -   os: ubuntu-latest
                        php: "8.2"
                        dependencies: lowest

        steps:
            -   name: Checkout
                uses: actions/checkout@v4
            -   name: Install PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: ${{ matrix.php }}
            -   name: Determine composer cache directory
                id: composer-cache
                run: echo "COMPOSER_CACHE_DIR=$(composer config cache-dir)" >> $GITHUB_ENV
            -   name: Cache dependencies composer installed with composer
                uses: actions/cache@v4
                with:
                    path: ${{ env.COMPOSER_CACHE_DIR }}
                    key: php${{ matrix.php }}-composer-${{ hashFiles('composer.json') }}
                    restore-keys: php${{ matrix.php }}-composer-
            -   name: Update composer
                run: composer self-update
            -   name: Install dependencies with composer
                run: |
                    if [ "${{ matrix.dependencies }}" = "lowest" ]; then
                        composer update $DEFAULT_COMPOSER_FLAGS --prefer-lowest --prefer-stable
                    else
                        composer update $DEFAULT_COMPOSER_FLAGS
                    fi
            -   name: Run unit tests
                run: vendor/bin/phpunit --display-all-issues --colors=always
